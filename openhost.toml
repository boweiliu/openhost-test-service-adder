[app]
name = "adder"
version = "0.1.0"
description = "Accumulator service consumer — adds numbers to the accumulator via the OpenHost service interface."

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"
public_paths = ["/", "/health"]

[[services.v2.consumes]]
service = "github.com/boweiliu/openhost-test-services/accumulator"
shortname = "accumulator"
version = ">=0.1.0"
grants = ["add"]

[resources]
memory_mb = 64
cpu_cores = 0.1